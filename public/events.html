<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Events — Mela Nights</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>

<header class="navbar">
  <div id="navLights" class="light-string"></div>
  <div class="navbar-inner">
    <a href="index.html" class="brand"><span class="brand-mark">🎟️</span> Mela Nights</a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="events.html" class="active">Explore Events</a>
      <a href="admin.html">Admin Dashboard</a>
      <a href="index.html#footer-contact">Contact</a>
    </nav>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
    </div>
  </div>
</header>

<main id="main">
  <div class="container page-header">
    <h1>Explore Events</h1>
    <p>Search and filter events by name, category, or city across India.</p>
  </div>

  <div class="container">
    <div class="filter-bar">
      <input type="search" id="searchInput" class="search-input" placeholder="🔍 Search events by name or city...">
      <select id="categoryFilter" class="filter-select">
        <option value="All">All Categories</option>
        <option value="Music">🎤 Music</option>
        <option value="Technology">💻 Technology</option>
        <option value="Festival">🪔 Festival</option>
        <option value="Business">📈 Business</option>
        <option value="Comedy">🎭 Comedy</option>
        <option value="Workshop">🎓 Workshop</option>
        <option value="Sports">🏏 Sports</option>
      </select>
      <select id="cityFilter" class="filter-select">
        <option value="All">All Cities</option>
        <option value="Delhi NCR">Delhi NCR</option>
        <option value="Bengaluru">Bengaluru</option>
        <option value="Mumbai">Mumbai</option>
        <option value="Ahmedabad">Ahmedabad</option>
        <option value="Hyderabad">Hyderabad</option>
        <option value="Pune">Pune</option>
        <option value="Jaipur">Jaipur</option>
      </select>
      <button class="btn btn-outline btn-sm" id="clearFilters">Clear</button>
    </div>

    <p id="resultCount" style="color:var(--text-faint); font-size:0.85rem; margin-bottom:18px;"></p>

    <div class="event-grid" id="eventGrid">
      <div class="spinner"></div>
    </div>
  </div>

  <div style="height:60px;"></div>
</main>

<footer class="footer">
  <div class="container footer-bottom" style="border-top:none; padding-top:0;">
    <span>© 2026 Mela Nights. All rights reserved.</span>
    <span>Made with ♥ in India — College Project (Task 3)</span>
  </div>
</footer>

<script src="js/main.js"></script>
<script src="js/events.js"></script>
</body>
</html>
